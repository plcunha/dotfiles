# ═══════════════════════════════════════════════════════════════
# TMUX CONFIG - Catppuccin Mocha Theme + WezTerm + Fish + OpenCode
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# SHOW/HIDE STATUS BAR
# ───────────────────────────────────────────────────────────────────────────────

bind v set -g status

# ───────────────────────────────────────────────────────────────────────────────
# SESSION SAVE/RESTORE (manual, no plugins required)
# ───────────────────────────────────────────────────────────────────────────────

# Save session layout to file
bind -r C-s run-shell "tmux list-windows - '#{session_name}' -F 'new-window -d -t #{session_name}:#{window_index} \"#{window_name}\"' > ~/.tmux-session_backup 2>/dev/null && tmux display 'Session saved to ~/.tmux-session_backup'"

# Show saved sessions
bind -r C-l run-shell "if [[ -f ~/.tmux-session_backup ]]; then cat ~/.tmux-session_backup; else echo 'No saved session found'; fi" \; command-prompt -p "Show session: "

# ───────────────────────────────────────────────────────────────────────────────
# KILL & RESPAWN
# ───────────────────────────────────────────────────────────────────────────────

# Detach
bind d detach-client

# ───────────────────────────────────────────────────────────────────────────────
# TERMINAL SETUP
# ───────────────────────────────────────────────────────────────────────────────

# Enable UTF-8
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Extended keys and focus events for TUIs (Neovim, etc.)
set -g extended-keys on
set -g focus-events on

# History limits
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ───────────────────────────────────────────────────────────────────────────────
# MOUSE & VI MODE
# ───────────────────────────────────────��───────────────────────────────────────

# Enable mouse support
set -g mouse on

# Enable vi mode for copy mode
set -g mode-keys vi

# ───────────────────────────────────────────────────────────────────────────────
# KEY BINDINGS
# ───────────────────────────────────────────────────────────────────────────────

# Unbind default prefix and use Ctrl+a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"  # horizontal
bind - split-window -v -c "#{pane_current_path}"  # vertical

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys (hold prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n previous-window
bind -r p next-window
bind -r N swap-window -t -1
bind -r P swap-window -t +1

# Pane synchronization toggle
bind S setw synchronize-pane on
bind s setw synchronize-pane off
bind a setw synchronize-pane toggle

# Synchronize all panes in current window
bind E command-prompt -p "Sync all panes? (on/off/toggle): " "setw synchronize-pane %%"

# Break pane to new window
bind b break-pane -d

# Join pane from another window
bind J command-prompt -p "Join pane from window:" "join-pane -s '%%'"

# Show keybindings
bind / list-keys

# ───────────────────────────────────────────────────────────────────────────────
# COPY MODE (macOS pbcopy)
# ───────────────────────────────────────────────────────────────────────────────

# Copy to clipboard on macOS
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Make pbcopy work in copy mode
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ───────────────────────────────────────────────────────────────────────────────
# STATUS BAR - Catppuccin Mocha Theme
# ───────────────────────────────────────────────────────────────────────────────

# Status bar position
set -g status-position top

# Refresh status more often
set -g status-interval 5

# Status bar length
set -g status-left-length 100
set -g status-right-length 100

# ─── Colors: Catppuccin Mocha ───
# Base colors
set -g status-bg colour235    # mantis
set -g status-fg colour223    # subtext1

# Left side: session name
set -g status-left "#[fg=colour223,bg=colour239,bold] #S #[fg=colour239,bg=colour235,nobold]"

# Window status
set -g window-status-format " #I: #W "
set -g window-status-current-format "#[fg=colour235,bg=colour141,bold] #I: #W #[fg=colour141,bg=colour235,nobold]"
set -g window-status-separator ""

# Activity & bell
set -g window-status-activity-style "fg=colour229,bg=colour239"
set -g window-status-bell-style "fg=colour229,bg=colour239"

# Right side: date, time, context
set -g status-right "#[fg=colour239,bg=colour235]#[fg=colour223,bg=colour239] %Y-%m-%d  %H:%M #[fg=colour239,bg=colour235,nobold]#[fg=colour141,bg=colour239] #($HOME/.local/bin/tmux-status.sh) #[fg=colour235,bg=colour239,nobold]"

# ───────────────────────────────────────────────────────────────────────────────
# PANE BORDERS - Catppuccin
# ───────────────────────────────────────────────────────────────────────────────

set -g pane-border-status off
set -g pane-border-format " #{pane_index} #{pane_current_command} "

# Pane border colors
set -g pane-border-style "fg=colour239,bg=colour235"
set -g pane-active-border-style "fg=colour141,bg=colour235"

# ───────────────────────────────────────────────────────────────────────────────
# MESSAGE / COMMAND MODE
# ───────────────────────────────────────────────────────────────────────────────

set -g message-style "fg=colour223,bg=colour239,bold"
set -g message-command-style "fg=colour223,bg=colour239,bold"

# ───────────────────────────────────────────────────────────────────────────────
# HOOKS
# ───────────────────────────────────────────────────────────────────────────────

# Hook: after-select-window - refresh status on window change
# This runs a command after selecting a window
# We use it to refresh any window-specific status

# Hook: client-session-changed - notify on session change
# Useful for notifications when tmux session changes

# Custom hook for OpenCode status
set -g @opencode_status_file "$HOME/.local/share/opencode/status"

# ───────────────────────────────────────────────────────────────────────────────
# PLUGINS (using tpm)
# ───────────────────────────────────────────────────────────────────────────────

# Install plugins with: prefix + I
# List of plugins (commented out - uncomment and run prefix+I to install)
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize tpm (keep this at the very bottom)
# run '~/.tmux/plugins/tpm/tpm'

# ───────────────────────────────────────────────────────────────────────────────
# MISC SETTINGS
# ────────────────────────────────────────────────────────��─��────────────────────

# Don't rename windows automatically
set -g allow-rename off

# Aggressive resize
set -g aggressive-resize on

# Escape time for neovim
set -g escape-time 0

# ───────────────────────────────────────────────────────────────────────────────
# ACTIVITY MONITOR
# ───────────────────────────────────────────────────────────────────────────────

# Monitor activity in other windows
setw -g monitor-activity off
set -g visual-activity off

# ───────────────────────────────────────────────────────────────────────────────
# CUSTOM USER VARIABLES
# ───────────────────────────────────────────────────────────────────────────────

# Store OpenCode project context
set -g @opencode_project ""
set -g @opencode_task ""

# Notification sound for hooks
set -g @notify_sound "Glass"